# Render Blueprint - Backend Web Service
# Documentation: https://docs.render.com/blueprint-spec

services:
  - type: web
    name: youtube-summarizer-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false # Must be set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false # Set to your Vercel frontend URL
